<section>
  <div class="post" {{mentionid}}>
    <h4>Kommentar #{{number}}</h4>
    <div class="content">
      {{text}}
    </div>
    <div class="meta-info">
      <span class="date">{{date}}</span>
      <span class="author">Author: {{author}}</span>
      <span class="mention">{{mention}}Antworten{{/mention}}</span>
    </div>
  </div>
</section>
