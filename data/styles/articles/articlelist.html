<article>
    <div class="post">
        <h3>{{headline}}</h3>
        <div class="status-pinned">
            {{statusPinned}}
        </div>
        <div class="content">
            {{textShort}}
        </div>
        <div class="categories">
            Kategorien: {{categoryTexts}}
        </div>
        <div class="meta-info">
            <span class="date">{{date}}</span> 
            <span class="author">Author: {{author}}</span> 
            <span class="link">{{permaLink}}Artikel-Link{{/permaLink}}</span>
            <span class="comment">{{commentCount}} {{commentLink}}Kommentare{{/commentLink}}</span>
        </div>
        <div class="source-links">
            {{sources descr="Quelle(n): " hideEmpty="true"}}
        </div>
        <div class="share-buttons">
            {{shareButtons}}
        </div>
    </div>
</article>
